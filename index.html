<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="icon" type="image/x-icon" href="./assets/fevicon.png">
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--wrapper-->
    <div class="wrapper">
        <h1>Weather App</h1>

        <div  class="tab-container">
            <p class="tab" data-userWeather>Your Weather</p>
            <p class="tab" data-searchWeather>Search Weather</p>
        </div> 

        <div class="weather-container">
            <!--grant location container-->
            <div class="sub-container grant-location-weather">
                <img src="./assets/location.png" alt="" width="80" height="80" loading="lazy">
                <p>Grant Location Access</p>
                <p>Allow Access to get Weather Information</p>
                <button class="btn" data-grantAccess>Grant Access</button>
            </div>

            <!--search form container-->
            <form class="form-container" data-searchForm>
                <input placeholder="Search for city..." data-searchInput>
                <button class="btn" type="submit">
                    <img src="./assets/search.png" alt="" width="20" height="20" loading="lazy">
                </button>
            </form>

            <!--loading screen container-->
            <div class="sub-container loading-container">
                <img src="./assets/loading.gif" alt="" width="150" height="150">
                <p>Loading</p>
            </div>

            <!--show weather-info-->
            <div class="sub-container user-info-container">
                <!--city name & flag-->
                <div class="name">
                    <p data-cityName></p>
                    <img data-countryIcon alt="">
                </div>
                <!--weather description-->
                <p data-weatherDesc></p>
                <!--weather icon-->
                <img data-weatherIcon alt="">
                <!--temperature-->
                <p data-temp></p>
                <!--3 cards wala container-->
                <div class="parameter-container">
                    <!--card 1-->
                    <div class="parameter">
                        <img src="./assets/wind.png" alt="" loading="lazy">
                        <p>Windspeed</p>
                        <p data-windSpeed></p>
                    </div>

                    <!--card 2-->
                    <div class="parameter">
                        <img src="./assets/humidity.png" alt="" loading="lazy">
                        <p>Humidity</p>
                        <p data-humidity></p>
                    </div>

                    <!--card 3-->
                    <div class="parameter">
                        <img src="./assets/cloud.png" alt="" loading="lazy">
                        <p>Clouds</p>
                        <p data-cloudiness></p>
                    </div>
                </div>
            </div>

            <!--error 404 handling-->
            <div class="error-404">
                <img src="./assets/not-found.png" alt="" width="300" height="300" loading="lazy">
                <p>City Not Found</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
